x-app-env: &app-env
  AIMG_DATABASE_URL: postgresql://aimg:aimg@postgres:5432/aimg
  AIMG_REDIS_URL: redis://redis:6379/0
  AIMG_S3_ENDPOINT: http://minio:9000
  AIMG_S3_ACCESS_KEY: minioadmin
  AIMG_S3_SECRET_KEY: minioadmin
  AIMG_S3_BUCKET: aimg
  AIMG_JWT_SECRET: ${AIMG_JWT_SECRET:-dev-jwt-secret-change-me}
  AIMG_ENCRYPTION_KEY: ${AIMG_ENCRYPTION_KEY:-dev-encryption-key-change-me}
  AIMG_ADMIN_SESSION_SECRET: ${AIMG_ADMIN_SESSION_SECRET:-dev-admin-session-secret-change-me}
  AIMG_LOG_LEVEL: ${AIMG_LOG_LEVEL:-DEBUG}
  AIMG_API_INTERNAL_URL: http://api:8000

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aimg
      POSTGRES_PASSWORD: aimg
      POSTGRES_DB: aimg
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimg"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: migrate
    environment:
      <<: *app-env
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: api
    ports:
      - "8010:8000"
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: worker
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  admin:
    build: .
    command: admin
    ports:
      - "8001:8001"
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
